<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <title>ShekelSync</title> -->
    <script>
      (() => {
        try {
          const savedMode = localStorage.getItem('theme-mode');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const startupTheme = savedMode === 'light' || savedMode === 'dark'
            ? savedMode
            : prefersDark ? 'dark' : 'light';

          document.documentElement.dataset.startupTheme = startupTheme;
        } catch {
          document.documentElement.dataset.startupTheme = 'dark';
        }
      })();
    </script>
    <style>
      :root {
        --startup-radius: 12px;
        --startup-accent-green: #a8f0b5;
        --startup-accent-peach: #f0b5a8;
        --startup-shell-bg:
          radial-gradient(circle at 18% 16%, rgba(168, 240, 181, 0.24), transparent 30%),
          radial-gradient(circle at 82% 18%, rgba(240, 181, 168, 0.2), transparent 26%),
          radial-gradient(circle at 50% 100%, rgba(62, 165, 77, 0.14), transparent 28%),
          linear-gradient(180deg, #12181d 0%, #090c0f 100%);
        --startup-shell-border: rgba(255, 255, 255, 0.06);
        --startup-shell-text: rgba(255, 255, 255, 0.94);
        --startup-shell-muted: rgba(255, 255, 255, 0.6);
        --startup-panel-bg: rgba(10, 14, 17, 0.76);
        --startup-panel-border: rgba(255, 255, 255, 0.08);
        --startup-panel-shadow:
          0 30px 70px rgba(0, 0, 0, 0.42),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        --startup-logo-frame-bg: linear-gradient(145deg, rgba(7, 11, 14, 0.96), rgba(25, 32, 36, 0.9));
        --startup-loader-track: rgba(255, 255, 255, 0.08);
        --startup-loader-glow: rgba(168, 240, 181, 0.2);
      }

      html[data-startup-theme='dark'] {
        color-scheme: dark;
      }

      html[data-startup-theme='light'] {
        color-scheme: light;
        --startup-shell-bg:
          radial-gradient(circle at 15% 18%, rgba(62, 165, 77, 0.2), transparent 28%),
          radial-gradient(circle at 84% 12%, rgba(165, 77, 62, 0.18), transparent 24%),
          radial-gradient(circle at 50% 110%, rgba(168, 240, 181, 0.28), transparent 32%),
          linear-gradient(180deg, #fcfdfb 0%, #f4f7f3 100%);
        --startup-shell-border: rgba(15, 20, 24, 0.08);
        --startup-shell-text: #18281c;
        --startup-shell-muted: rgba(24, 40, 28, 0.66);
        --startup-panel-bg: rgba(255, 255, 255, 0.74);
        --startup-panel-border: rgba(24, 40, 28, 0.1);
        --startup-panel-shadow:
          0 24px 60px rgba(19, 35, 21, 0.12),
          inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        --startup-logo-frame-bg: linear-gradient(145deg, rgba(15, 20, 24, 0.96), rgba(35, 41, 46, 0.9));
        --startup-loader-track: rgba(24, 40, 28, 0.1);
        --startup-loader-glow: rgba(62, 165, 77, 0.14);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body[data-app-ready='true'] #startup-shell {
        opacity: 0;
        pointer-events: none;
      }

      #startup-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--startup-radius);
        background: var(--startup-shell-bg);
        box-shadow:
          0 18px 48px rgba(0, 0, 0, 0.34),
          inset 0 0 0 1px var(--startup-shell-border);
        color: var(--startup-shell-text);
        transition: opacity 180ms ease;
      }

      #startup-shell::before,
      #startup-shell::after {
        content: '';
        position: absolute;
        border-radius: 999px;
        filter: blur(72px);
        opacity: 0.5;
        pointer-events: none;
      }

      #startup-shell::before {
        width: min(30vw, 340px);
        height: min(30vw, 340px);
        top: 8%;
        left: 10%;
        background: rgba(168, 240, 181, 0.22);
      }

      #startup-shell::after {
        width: min(28vw, 320px);
        height: min(28vw, 320px);
        right: 10%;
        bottom: 8%;
        background: rgba(240, 181, 168, 0.18);
      }

      .startup-shell__panel {
        position: relative;
        width: min(440px, calc(100vw - 48px));
        padding: 28px 28px 24px;
        border-radius: 28px;
        border: 1px solid var(--startup-panel-border);
        background: var(--startup-panel-bg);
        box-shadow: var(--startup-panel-shadow);
        -webkit-backdrop-filter: blur(22px);
        backdrop-filter: blur(22px);
        overflow: hidden;
      }

      .startup-shell__panel::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 34%),
          linear-gradient(315deg, rgba(168, 240, 181, 0.08), transparent 42%);
        pointer-events: none;
      }

      .startup-shell__content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        font-family:
          'Inter Variable',
          'Inter',
          'Segoe UI',
          sans-serif;
        text-align: center;
      }

      .startup-shell__logo-frame {
        position: relative;
        display: grid;
        place-items: center;
        width: 146px;
        height: 146px;
        border-radius: 36px;
        background: var(--startup-logo-frame-bg);
        box-shadow:
          0 22px 50px rgba(0, 0, 0, 0.28),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        animation: startup-float 3.6s ease-in-out infinite;
      }

      .startup-shell__logo-frame::before {
        content: '';
        position: absolute;
        inset: 16px;
        border-radius: 28px;
        background:
          radial-gradient(circle at 30% 30%, rgba(240, 181, 168, 0.16), transparent 42%),
          radial-gradient(circle at 72% 68%, rgba(168, 240, 181, 0.2), transparent 44%);
        opacity: 0.95;
      }

      .startup-shell__logo {
        position: relative;
        width: 104px;
        height: auto;
        filter:
          drop-shadow(0 10px 18px rgba(0, 0, 0, 0.22))
          drop-shadow(0 0 22px rgba(168, 240, 181, 0.08));
      }

      .startup-shell__eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--startup-shell-muted);
      }

      .startup-shell__label {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .startup-shell__status {
        max-width: 32ch;
        font-size: 14px;
        line-height: 1.5;
        color: var(--startup-shell-muted);
      }

      .startup-shell__loader {
        position: relative;
        width: min(240px, 68vw);
        height: 10px;
        border-radius: 999px;
        background: var(--startup-loader-track);
        overflow: hidden;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.04),
          0 0 24px var(--startup-loader-glow);
      }

      .startup-shell__loader::before,
      .startup-shell__loader::after {
        content: '';
        position: absolute;
        top: 1px;
        bottom: 1px;
        border-radius: inherit;
      }

      .startup-shell__loader::before {
        width: 42%;
        left: -42%;
        background: linear-gradient(
          90deg,
          rgba(240, 181, 168, 0.92) 0%,
          rgba(214, 222, 199, 0.92) 52%,
          rgba(168, 240, 181, 0.96) 100%
        );
        animation: startup-slide 1.8s cubic-bezier(0.37, 0, 0.22, 1) infinite;
      }

      .startup-shell__loader::after {
        width: 24%;
        right: -24%;
        background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.32) 100%);
        animation: startup-shimmer 1.8s cubic-bezier(0.37, 0, 0.22, 1) infinite;
      }

      .startup-shell__caption {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--startup-shell-muted);
        letter-spacing: 0.04em;
      }

      .startup-shell__caption-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--startup-accent-peach) 0%, var(--startup-accent-green) 100%);
        box-shadow: 0 0 16px rgba(168, 240, 181, 0.24);
        animation: startup-blink 1.6s ease-in-out infinite;
      }

      html.reduce-visual-effects #startup-shell,
      html.reduce-visual-effects #startup-shell * {
        animation: none !important;
        transition: none !important;
      }

      @keyframes startup-slide {
        0% {
          transform: translateX(0);
        }

        100% {
          transform: translateX(340%);
        }
      }

      @keyframes startup-shimmer {
        0% {
          transform: translateX(0);
          opacity: 0;
        }

        35%,
        100% {
          transform: translateX(-420%);
          opacity: 1;
        }
      }

      @keyframes startup-float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-4px);
        }
      }

      @keyframes startup-blink {
        0%,
        100% {
          opacity: 0.72;
          transform: scale(1);
        }

        50% {
          opacity: 1;
          transform: scale(1.14);
        }
      }
    </style>
  </head>
